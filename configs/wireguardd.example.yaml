listen:
  http: "127.0.0.1:51880"
  # unix: "/run/wireguardd/wireguardd.sock"
  metrics: "127.0.0.1:9091"

snmp:
  enabled: true
  # Full SNMPv2c: GET / GETNEXT / GETBULK (SET → notWritable)
  listen: "127.0.0.1:1161"   # bind 0.0.0.0:161 only behind firewall
  community: "change-me-snmp"
  enterprise_oid: "1.3.6.1.4.1.66666.1"  # placeholder PEN

db:
  # Two SQLite files for isolation under high sample volume:
  #   state.db       — interfaces/peers/events (SoT), performance pragmas
  #   timeseries.db  — traffic_samples only (128MiB cache, 512MiB mmap, no FKs)
  path: "/var/lib/wireguardd/state.db"
  # timeseries_path: "/var/lib/wireguardd/timeseries.db"  # default: <dir>/timeseries.db

auth:
  token: "change-me"

wireguard:
  conf_dir: "/etc/wireguard"
  persistence: "hybrid" # database | wg-quick | hybrid
  handshake_connected_sec: 180
  sample_interval: 5s
  reconcile_interval: 5s
  allow_hooks: false
  # Per-peer bandwidth (independent RX + TX):
  #   tc  — Linux traffic control: HTB (TX) + ingress police (RX)
  #   nft — nftables inet table per iface: limit rate over … drop
  #         covers input/forward/output (routed + local)
  #   none — disable host enforcement
  # Peers need host-sized assigned_ips or /32|/128 allowed_ips for matching.
  bandwidth_backend: "tc" # tc | nft | none
  # Host DNS apply for interface DNS= (wg-quick parity):
  #   auto        — prefer resolvectl (systemd-resolved), else resolvconf
  #   resolvectl  — resolvectl dns/domain/default-route
  #   resolvconf  — openresolv / Debian resolvconf (tun.<iface>)
  #   none        — store/export only
  dns_backend: "auto"
  # use_mock_backend: true  # for dev without kernel module (required if wgctrl unavailable)
  # On boot, import already-running WireGuard interfaces into the DB without
  # tearing them down (also: wireguardctl discover / wireguardctl adopt).
  adopt_on_start: false

# Push events to an external multi-tenant controller (optional).
# HMAC: X-Webhook-Signature: sha256=<hex>
# Body: {agent,version,ts,level,kind,resource,subject,message,meta}
# resource = interface name; subject = peer public key when applicable.
# Kinds: interface.up|down, peer.connected|disconnected, enforce, audit, …
webhooks:
  enabled: false
  # url: "https://controller.example/hooks/wireguardd"
  # secret: "shared-hmac-secret"
  # events: ["*"]   # or ["peer.*","interface.*","enforce"]
  # timeout: 5s

log:
  level: info
  format: json

read_only: false
