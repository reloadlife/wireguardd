openapi: 3.0.3
info:
  title: wireguardd API
  version: 1.0.0
  description: |
    REST API for WireGuard interface and peer management.
    All `/v1/*` routes require `Authorization: Bearer <token>`.
    See docs/API.md for the full route list.
servers:
  - url: http://127.0.0.1:51880
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      security: []
      summary: Liveness
      responses:
        "200":
          description: OK
  /readyz:
    get:
      security: []
      summary: Readiness (database)
      responses:
        "200":
          description: Ready
  /v1/version:
    get:
      summary: Version
      responses:
        "200":
          description: Version info
  /v1/discover:
    get:
      summary: Preview live host WireGuard devices
      parameters:
        - name: name
          in: query
          schema:
            type: string
          description: Optional interface name filter (repeatable)
      responses:
        "200":
          description: Adopt preview report
  /v1/adopt:
    post:
      summary: Import live WireGuard into the database (non-destructive)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                names:
                  type: array
                  items:
                    type: string
                read_conf:
                  type: boolean
                overwrite:
                  type: boolean
      responses:
        "200":
          description: Adopt report
  /v1/interfaces:
    get:
      summary: List interfaces
      responses:
        "200":
          description: Interface list
    post:
      summary: Create interface
      responses:
        "201":
          description: Created
  /v1/interfaces/{name}:
    parameters:
      - $ref: "#/components/parameters/Name"
    get:
      summary: Get interface
      responses:
        "200":
          description: Interface
    patch:
      summary: Update interface
      responses:
        "200":
          description: Updated
    delete:
      summary: Delete interface
      responses:
        "204":
          description: Deleted
  /v1/interfaces/{name}/peers:
    parameters:
      - $ref: "#/components/parameters/Name"
    get:
      summary: List peers
      responses:
        "200":
          description: Peer list
    post:
      summary: Create peer (auto-allocates IP if allowed/assigned empty)
      responses:
        "201":
          description: Created
  /v1/interfaces/{name}/peers/{pubkey}:
    parameters:
      - $ref: "#/components/parameters/Name"
      - $ref: "#/components/parameters/Pubkey"
    get:
      summary: Get peer
      responses:
        "200":
          description: Peer
    patch:
      summary: Update peer
      responses:
        "200":
          description: Updated
    delete:
      summary: Delete peer
      responses:
        "204":
          description: Deleted
  /v1/interfaces/{name}/peers/{pubkey}/client-config:
    parameters:
      - $ref: "#/components/parameters/Name"
      - $ref: "#/components/parameters/Pubkey"
    get:
      summary: Client wg-quick conf (requires client_private_key)
      responses:
        "200":
          description: Config text
  /v1/interfaces/{name}/peers/{pubkey}/issue-client-key:
    parameters:
      - $ref: "#/components/parameters/Name"
      - $ref: "#/components/parameters/Pubkey"
    post:
      summary: Issue or rotate client private key + conf
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rotate:
                  type: boolean
      responses:
        "200":
          description: Key + config
  /v1/interfaces/{name}/peers/{pubkey}/qr:
    parameters:
      - $ref: "#/components/parameters/Name"
      - $ref: "#/components/parameters/Pubkey"
    get:
      summary: Client conf as PNG QR
      responses:
        "200":
          description: PNG image
          content:
            image/png:
              schema:
                type: string
                format: binary
  /v1/stats:
    get:
      summary: Global stats rollup
      responses:
        "200":
          description: Stats
  /metrics:
    get:
      security: []
      summary: Prometheus metrics
      responses:
        "200":
          description: Text exposition format
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    Name:
      name: name
      in: path
      required: true
      schema:
        type: string
    Pubkey:
      name: pubkey
      in: path
      required: true
      description: WireGuard public key (URL-safe base64 OK)
      schema:
        type: string
