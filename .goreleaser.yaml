version: 2

project_name: wireguardd

before:
  hooks:
    - go mod tidy

builds:
  - id: wireguardd
    main: ./cmd/wireguardd
    binary: wireguardd
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/reloadlife/wireguardd/internal/version.Version={{.Version}}
      - -X github.com/reloadlife/wireguardd/internal/version.Commit={{.Commit}}
      - -X github.com/reloadlife/wireguardd/internal/version.Date={{.Date}}

  - id: wireguardctl
    main: ./cmd/wireguardctl
    binary: wireguardctl
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/reloadlife/wireguardd/internal/version.Version={{.Version}}
      - -X github.com/reloadlife/wireguardd/internal/version.Commit={{.Commit}}
      - -X github.com/reloadlife/wireguardd/internal/version.Date={{.Date}}

archives:
  # Separate archives: wireguardd is Linux-only; wireguardctl also ships for macOS.
  - id: wireguardd
    ids: [wireguardd]
    formats: [tar.gz]
    name_template: >-
      wireguardd_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - configs/*
      - deploy/*
      - api/openapi.yaml
      - scripts/install.sh

  - id: wireguardctl
    ids: [wireguardctl]
    formats: [tar.gz]
    name_template: >-
      wireguardctl_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - configs/wireguardctl.example.yaml
      - scripts/install.sh

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  name_template: "wireguardd {{.Tag}}"
  draft: false
  prerelease: auto
  mode: replace
  footer: |
    ## Install (recommended)

    ```bash
    curl -fsSL https://raw.githubusercontent.com/reloadlife/wireguardd/main/scripts/install.sh | sudo bash
    ```

    Pin this release:

    ```bash
    curl -fsSL https://raw.githubusercontent.com/reloadlife/wireguardd/main/scripts/install.sh \
      | sudo bash -s -- --version {{ .Tag }}
    ```

    Private repo: set `GITHUB_TOKEN` (needs `repo` scope) and pass
    `Authorization: Bearer $GITHUB_TOKEN` to `curl`, then
    `sudo -E env GITHUB_TOKEN="$GITHUB_TOKEN" bash`.

    ### Manual (Linux amd64)

    ```bash
    tar -xzf wireguardd_{{ .Version }}_linux_amd64.tar.gz
    tar -xzf wireguardctl_{{ .Version }}_linux_amd64.tar.gz
    sudo install -m 0755 wireguardd wireguardctl /usr/local/bin/
    ```

    ### Manual (macOS ctl)

    ```bash
    tar -xzf wireguardctl_{{ .Version }}_darwin_arm64.tar.gz
    sudo install -m 0755 wireguardctl /usr/local/bin/
    ```

    ## Checksums

    Verify downloads with `checksums.txt` (SHA-256).

