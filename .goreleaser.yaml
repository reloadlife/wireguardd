version: 2

project_name: wireguardd

before:
  hooks:
    - go mod tidy

builds:
  - id: wireguardd
    main: ./cmd/wireguardd
    binary: wireguardd
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/reloadlife/wireguardd/internal/version.Version={{.Version}}
      - -X github.com/reloadlife/wireguardd/internal/version.Commit={{.Commit}}
      - -X github.com/reloadlife/wireguardd/internal/version.Date={{.Date}}

  - id: wireguardctl
    main: ./cmd/wireguardctl
    binary: wireguardctl
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/reloadlife/wireguardd/internal/version.Version={{.Version}}
      - -X github.com/reloadlife/wireguardd/internal/version.Commit={{.Commit}}
      - -X github.com/reloadlife/wireguardd/internal/version.Date={{.Date}}

archives:
  # Separate archives: wireguardd is Linux-only; wireguardctl also ships for macOS.
  - id: wireguardd
    ids: [wireguardd]
    formats: [tar.gz]
    name_template: >-
      wireguardd_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - configs/*
      - deploy/*
      - api/openapi.yaml

  - id: wireguardctl
    ids: [wireguardctl]
    formats: [tar.gz]
    name_template: >-
      wireguardctl_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - configs/wireguardctl.example.yaml

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  name_template: "wireguardd {{.Tag}}"
  draft: false
  prerelease: auto
  mode: replace
  footer: |
    ## Install

    ### Linux daemon + ctl (amd64)

    ```bash
    tar -xzf wireguardd_{{ .Tag }}_linux_amd64.tar.gz
    tar -xzf wireguardctl_{{ .Tag }}_linux_amd64.tar.gz
    sudo install -m 0755 wireguardd wireguardctl /usr/local/bin/
    ```

    ### macOS control panel only (ctl)

    ```bash
    tar -xzf wireguardctl_{{ .Tag }}_darwin_arm64.tar.gz
    sudo install -m 0755 wireguardctl /usr/local/bin/
    ```

    See [README](https://github.com/reloadlife/wireguardd#readme) for configuration and systemd.

    ## Checksums

    Verify downloads with `checksums.txt` (SHA-256).

